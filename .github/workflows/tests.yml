name: Tests

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  phpunit:
    name: PHP ${{ matrix.php }} / ${{ matrix.dependencies }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.2'
          - '8.3'
          - '8.4'
        dependencies:
          - prefer-stable
          - prefer-lowest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, openssl, sockets
          coverage: none

      - name: Validate composer.json
        run: composer validate --no-check-lock --strict

      - name: Install dependencies
        run: |
          if [ "${{ matrix.dependencies }}" = "prefer-lowest" ]; then
            composer update --prefer-lowest --prefer-stable --prefer-dist --no-interaction --no-progress
          else
            composer update --prefer-stable --prefer-dist --no-interaction --no-progress
          fi

      - name: Run tests
        run: vendor/bin/phpunit
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
